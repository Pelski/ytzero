version: 2
updates:
  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Backend (Bun/Hono) dependencies
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"

  # Frontend (React/Vite) dependencies
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
