name: Release

# Pushing a vX.Y.Z tag creates a GitHub Release with a list of commits
# made since the previous tag.
# Docker images are built by docker-ghcr.yml for the same tag.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          previous_tag="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"

          {
            echo "## Changes"
            echo

            if [[ -n "${previous_tag}" ]]; then
              git log \
                --no-merges \
                --pretty=format:'- %s (`%h`)' \
                "${previous_tag}..${tag}"
              echo
              echo
              echo "[View full comparison](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag})"
            else
              git log \
                --no-merges \
                --pretty=format:'- %s (`%h`)' \
                "${tag}"
              echo
            fi
          } > release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Mark tags containing a hyphen as pre-releases (for example v1.2.0-rc.1).
          prerelease=()
          case "${GITHUB_REF_NAME}" in
            *-*) prerelease+=(--prerelease) ;;
          esac

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            "${prerelease[@]}"
