<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YT Zero" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>YT Zero</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Keep the document language correct before React loads. Chrome uses this
      // attribute to decide whether to offer translation.
      const uiLanguage = localStorage.getItem("language");
      if (uiLanguage === "en" || uiLanguage === "pl" || uiLanguage === "de") {
        document.documentElement.lang = uiLanguage;
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
